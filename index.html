<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>Stk/Trk | WMS</title>
        <meta name="Author" content="Jamie Lang">

        <link rel="stylesheet" href="vendors/bootstrap/bootstrap.min.css">
        <link rel="stylesheet" href="vendors/fontawesome/css/all.min.css">
        <link rel="icon" href="assets/favicon.png">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header>
            <h1>Stk/Trk Warehouse Systems</h1>
        </header>

        <main>
            <section>
                <h2>Dashboard</h2>

                <div class="row">
                    <div class="col">
                        <div class="card" id="totalProductsCard">
                            <div class="card-body">
                                <h3 class="card-title"></h3>
                            </div>
                        </div>
                    </div>

                    <div class="col">
                        <div class="card" id="lowStockCard">
                            <div class="card-body">
                                <h3 class="card-title"></h3>
                            </div>
                        </div>
                    </div>

                    <div class="col">
                        <div class="card" id="outOfStockCard">
                            <div class="card-body">
                                <h3 class="card-title"></h3>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <h2>Receive Stock</h2>
                <form id="receiveStockForm">
                    <select id="receiveSku" class="form-select" required></select>

                    <input
                        type="number"
                        id="receivedQuantity"
                        class="form-control"
                        min="1"
                        placeholder="Quantity Received"
                        required>

                    <button type="submit" class="btn btn-primary">Receive Stock</button>
                </form>
            </section>

            <section>
                <h2>Products</h2>
    
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Location</th>
                            <th>Stock</th>
                            <th>Reorder Level</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                    </tbody>
                </table>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Stk/Trk Software Ltd. All Rights Reserved.</p>
        </footer>

        <script src="vendors/bootstrap/bootstrap.bundle.min.js"></script>
        <script src="js/script.js"></script>
    </body>
</html>
