<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>Stk/Trk | WMS</title>
        <meta name="Author" content="Jamie Lang">

        <link rel="stylesheet" href="vendors/bootstrap/bootstrap.min.css">
        <link rel="stylesheet" href="vendors/fontawesome/css/all.min.css">
        <link rel="icon" href="assets/favicon.png">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header class="mb-3">
            <h1>Stk/Trk Warehouse Systems</h1>
        </header>

        <main>
            <section class="mb-3">
                <h2>Dashboard</h2>

                <div class="row">
                    <div class="col">
                        <div class="card" id="totalProductsCard">
                            <div class="card-body">
                                <h3 class="card-title"></h3>
                            </div>
                        </div>
                    </div>

                    <div class="col">
                        <div class="card" id="lowStockCard">
                            <div class="card-body">
                                <h3 class="card-title"></h3>
                            </div>
                        </div>
                    </div>

                    <div class="col">
                        <div class="card" id="outOfStockCard">
                            <div class="card-body">
                                <h3 class="card-title"></h3>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="mb-3">
                <h2>Receive Stock</h2>
                <form id="receiveStockForm">
                    <select id="receiveSku" class="form-select" required></select>

                    <input
                        type="number"
                        id="receivedQuantity"
                        class="form-control"
                        min="1"
                        placeholder="Quantity Received"
                        required>

                    <button type="submit" class="btn btn-primary">Receive Stock</button>
                </form>
            </section>

            <section class="mb-3">
                <h2>Despatch Order</h2>
                <form id="despatchOrderForm">
                    <select id="orderNumber" class="form-select" required></select>

                    <button type="submit" class="btn btn-primary">Despatch Order</button>
                </form>
            </section>

            <section class="mb-3">
                <h2>Orders</h2>
                
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Order No.</th>
                            <th>Customer</th>
                            <th>Area</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Items</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                    </tbody>
                </table>
            </section>

            <section class="mb-3">
                <h2>Products</h2>
                
                <select id="productStatusFilter" class="form-select mb-3">
                    <option value="All">View All</option>
                    <option value="In Stock">In Stock</option>
                    <option value="Low Stock">Low Stock</option>
                    <option value="Out of Stock">Out of Stock</option>
                </select>

                <select id="productLocationFilter" class="form-select mb-3">
                    <option value="All">All Locations</option>
                    <option value="A1-F">A1-F</option>
                    <option value="A2-A">A2-A</option>
                    <option value="D5-C">D5-C</option>
                </select>

                <select id="productCategoryFilter" class="form-select mb-3">
                    <option value="All">All Categories</option>
                    <option value="PPE">PPE</option>
                    <option value="Hi-Vis">Hi-Vis</option>
                </select>
    
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Location</th>
                            <th>Stock</th>
                            <th>Reorder Level</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                    </tbody>
                </table>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Stk/Trk Warehouse Systems Ltd. All Rights Reserved.</p>
        </footer>

        <script src="vendors/bootstrap/bootstrap.bundle.min.js"></script>
        <script src="js/script.js"></script>
    </body>
</html>
